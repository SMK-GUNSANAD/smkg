<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Log Masuk · Dashboard SMKG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ease:cubic-bezier(.2,.8,.2,1); --ease2:cubic-bezier(.16,1,.3,1);
      --bg0:#0a0b0f; --bg1:#0f1017;
      --surface:rgba(255,255,255,.04); --surface-hover:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.13);
      --text:rgba(255,255,255,.95); --muted:rgba(255,255,255,.50); --muted2:rgba(255,255,255,.28);
      --accent:#6366f1; --accent2:#8b5cf6;
      --accent-glow:rgba(99,102,241,.20); --accent-text:#818cf8; --accent-border:rgba(99,102,241,.25);
      --gridLine:rgba(255,255,255,.04);
    }
    html[data-theme="light"]{
      --bg0:#f5f5fa; --bg1:#ffffff;
      --surface:rgba(0,0,0,.03); --surface-hover:rgba(0,0,0,.055);
      --border:rgba(0,0,0,.07); --border-strong:rgba(0,0,0,.12);
      --text:rgba(10,10,15,.95); --muted:rgba(10,10,15,.50); --muted2:rgba(10,10,15,.28);
      --accent-text:#4f46e5; --accent-glow:rgba(99,102,241,.10); --accent-border:rgba(99,102,241,.18);
      --gridLine:rgba(0,0,0,.04);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Geist',system-ui,sans-serif;background:var(--bg0);color:var(--text);-webkit-font-smoothing:antialiased;}
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 900px 700px at 20% 20%,rgba(99,102,241,.12),transparent 60%),
                 radial-gradient(ellipse 700px 600px at 80% 80%,rgba(139,92,246,.09),transparent 55%),var(--bg0);}
    .grid{position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(to right,var(--gridLine) 1px,transparent 1px),
                       linear-gradient(to bottom,var(--gridLine) 1px,transparent 1px);
      background-size:60px 60px;}
    /* CENTER CARD */
    .stage{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{
      width:min(420px,100%); background:var(--bg1);
      border:1px solid var(--border-strong); border-radius:24px;
      padding:40px 36px; box-shadow:0 32px 80px rgba(0,0,0,.40);
      animation:riseIn .6s var(--ease2) forwards;
    }
    html[data-theme="light"] .card{box-shadow:0 32px 80px rgba(0,0,0,.08);}
    @keyframes riseIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    /* HEADER */
    .card-mark{
      width:48px;height:48px;border-radius:14px;margin:0 auto 20px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;
      font-size:22px;color:#fff;font-weight:700;
      box-shadow:0 0 32px var(--accent-glow);
    }
    .card-title{font-size:22px;font-weight:800;letter-spacing:-.04em;text-align:center;margin-bottom:6px;}
    .card-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:28px;}
    /* ROLE BADGES */
    .role-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:28px;}
    .role-pill{
      font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      font-family:'Geist Mono',monospace;padding:4px 10px;border-radius:100px;
      border:1px solid;
    }
    .role-pill.sa{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.28);color:#818cf8;}
    .role-pill.ad{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.25);color:#a78bfa;}
    .role-pill.pk{background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.22);color:#4ade80;}
    .role-pill.kb{background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.22);color:#fbbf24;}
    .role-pill.kp{background:rgba(59,130,246,.10);border-color:rgba(59,130,246,.22);color:#60a5fa;}
    .role-pill.ga{background:rgba(148,163,184,.10);border-color:rgba(148,163,184,.22);color:#94a3b8;}
    html[data-theme="light"] .role-pill.pk{color:#16a34a;}
    html[data-theme="light"] .role-pill.kb{color:#d97706;}
    html[data-theme="light"] .role-pill.kp{color:#2563eb;}
    html[data-theme="light"] .role-pill.ga{color:#64748b;}
    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-text{font-size:11px;color:var(--muted2);font-family:'Geist Mono',monospace;letter-spacing:.06em;}
    /* GOOGLE BTN */
    .google-btn{
      width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
      padding:14px 20px;border-radius:12px;
      background:var(--surface);border:1px solid var(--border-strong);
      color:var(--text);font-family:'Geist',sans-serif;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .2s var(--ease);
    }
    .google-btn:hover{background:var(--surface-hover);border-color:var(--accent-border);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.20);}
    .google-btn:active{transform:translateY(0);}
    .google-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .google-icon{width:20px;height:20px;flex-shrink:0;}
    /* STATUS */
    .status-box{
      margin-top:16px;padding:12px 14px;border-radius:10px;
      background:var(--surface);border:1px solid var(--border);
      font-size:12px;color:var(--muted);text-align:center;
      font-family:'Geist Mono',monospace;letter-spacing:.02em;
      display:none;
    }
    .status-box.show{display:block;}
    .status-box.error{border-color:rgba(239,68,68,.25);color:#f87171;background:rgba(239,68,68,.08);}
    .status-box.success{border-color:rgba(34,197,94,.22);color:#4ade80;background:rgba(34,197,94,.07);}
    html[data-theme="light"] .status-box.error{color:#dc2626;}
    html[data-theme="light"] .status-box.success{color:#16a34a;}
    /* SPINNER */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* FOOTER */
    .card-footer{margin-top:24px;text-align:center;font-size:11px;color:var(--muted2);line-height:1.6;}
    .card-footer a{color:var(--accent-text);text-decoration:none;}
    .card-footer a:hover{text-decoration:underline;}
    /* LOGGED-IN STATE */
    .user-card{display:none;flex-direction:column;align-items:center;gap:14px;}
    .user-card.show{display:flex;}
    .user-avatar{
      width:56px;height:56px;border-radius:50%;overflow:hidden;
      border:2px solid var(--accent-border);background:var(--accent-glow);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:700;color:var(--accent-text);
    }
    .user-avatar img{width:100%;height:100%;object-fit:cover;}
    .user-name{font-size:16px;font-weight:700;text-align:center;}
    .user-email{font-size:12px;color:var(--muted);text-align:center;font-family:'Geist Mono',monospace;}
    .user-role-badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 14px;border-radius:100px;
      font-size:12px;font-weight:600;font-family:'Geist Mono',monospace;
      letter-spacing:.04em;text-transform:uppercase;
    }
    .action-row{display:flex;gap:10px;width:100%;}
    .btn-primary{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);box-shadow:0 0 20px var(--accent-glow);}
    .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-secondary{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:10px;background:var(--surface);color:var(--muted);border:1px solid var(--border);font-family:'Geist',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
    .btn-secondary:hover{background:var(--surface-hover);color:var(--text);}
    /* NAV */
    .topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,11,15,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
    html[data-theme="light"] .topbar{background:rgba(255,255,255,.88);}
    .brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);}
    .brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;}
    .brand-name{font-size:13px;font-weight:700;letter-spacing:-.01em;}
    .theme-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-family:'Geist',sans-serif;cursor:pointer;transition:all .2s;}
    .theme-btn:hover{background:var(--surface-hover);color:var(--text);}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grid"></div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <div class="brand-mark">◆</div>
      <span class="brand-name">Dashboard SMKG</span>
    </a>
    <button class="theme-btn" id="themeToggle"><span id="themeIcon">☾</span><span id="themeLabel">Dark</span></button>
  </header>

  <div class="stage" style="padding-top:80px;">
    <div class="card">
      <div class="card-mark">◆</div>

      <!-- LOGIN VIEW -->
      <div id="loginView">
        <div class="card-title">Log Masuk SMKG</div>
        <div class="card-sub">Portal Kurikulum memerlukan pengesahan identiti.<br>Gunakan akaun Google sekolah anda.</div>

        <div class="role-row">
          <span class="role-pill sa">Super Admin</span>
          <span class="role-pill ad">Admin</span>
          <span class="role-pill pk">PK</span>
          <span class="role-pill kb">KB</span>
          <span class="role-pill kp">KP</span>
          <span class="role-pill ga">GA</span>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Teruskan dengan</span>
          <div class="divider-line"></div>
        </div>

        <button class="google-btn" id="googleBtn" onclick="handleGoogleLogin()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Log masuk dengan Google
        </button>

        <div class="status-box" id="statusBox"></div>

        <div class="card-footer">
          Akses dikawalselia oleh <strong>SMK Gunsanad</strong>.<br>
          Hubungi admin jika tiada akses. <a href="index.html">← Kembali</a>
        </div>
      </div>

      <!-- LOGGED-IN VIEW -->
      <div id="loggedInView" style="display:none;">
        <div class="user-card show" id="userCard">
          <div class="user-avatar" id="userAvatar">?</div>
          <div>
            <div class="user-name" id="userName">—</div>
            <div class="user-email" id="userEmail">—</div>
          </div>
          <div class="user-role-badge" id="userRoleBadge">—</div>
          <div class="action-row">
            <button class="btn-primary" id="continueBtn" onclick="goToAkademik()">
              → Teruskan ke Kurikulum
            </button>
            <button class="btn-secondary" onclick="handleSignOut()">Log Keluar</button>
          </div>
        </div>
        <div class="status-box" id="statusBox2"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { supabase, getUserRole, ensureUserRole, signInWithGoogle, signOut, ROLE_LABELS, ROLE_COLORS } from './supabase-config.js';

    /* THEME */
    const root=document.documentElement;
    const tBtn=document.getElementById('themeToggle'),tIco=document.getElementById('themeIcon'),tLbl=document.getElementById('themeLabel');
    function setTheme(t){root.setAttribute('data-theme',t);tIco.textContent=t==='light'?'☀':'☾';tLbl.textContent=t==='light'?'Light':'Dark';localStorage.setItem('smkg_theme',t);}
    tBtn.onclick=()=>setTheme(root.getAttribute('data-theme')==='light'?'dark':'light');
    setTheme(localStorage.getItem('smkg_theme')||'dark');

    /* REDIRECT TARGET */
    const params=new URLSearchParams(location.search);
    const redirectTo=params.get('redirect')||'akademik.html';
    window.goToAkademik=()=>{ location.href=redirectTo; };

    /* STATUS HELPERS */
    function setStatus(msg,type='',id='statusBox'){
      const el=document.getElementById(id);
      el.textContent=msg;el.className='status-box show'+(type?' '+type:'');
    }
    function clearStatus(id='statusBox'){document.getElementById(id).className='status-box';}

    /* GOOGLE LOGIN */
    window.handleGoogleLogin=async()=>{
      const btn=document.getElementById('googleBtn');
      btn.disabled=true;
      btn.innerHTML=`<span class="spinner"></span> Mengalihkan ke Google…`;
      setStatus('Membuka Google Sign-In…');
      // Store redirect target so we can use it after OAuth callback
      localStorage.setItem('smkg_auth_redirect', redirectTo);
      await signInWithGoogle('https://smk-gunsanad.github.io/smkg/auth.html');
      // Page will redirect — code below won't run
    };

    /* SIGN OUT */
    window.handleSignOut=async()=>{
      await signOut();
      document.getElementById('loggedInView').style.display='none';
      document.getElementById('loginView').style.display='block';
      clearStatus('statusBox2');
    };

    /* RENDER LOGGED-IN STATE */
    async function showLoggedIn(user){
      document.getElementById('loginView').style.display='none';
      document.getElementById('loggedInView').style.display='block';

      // Avatar
      const avatarEl=document.getElementById('userAvatar');
      const pic=user.user_metadata?.avatar_url;
      if(pic){ avatarEl.innerHTML=`<img src="${pic}" alt="avatar"/>`; }
      else{ avatarEl.textContent=(user.user_metadata?.full_name||user.email||'?')[0].toUpperCase(); }

      document.getElementById('userName').textContent=user.user_metadata?.full_name||user.email;
      document.getElementById('userEmail').textContent=user.email;

      // Ensure user exists in user_roles (first login creates GA record)
      await ensureUserRole(user);

      // Fetch role
      const role=await getUserRole(user.id);
      const label=ROLE_LABELS[role]||role;
      const colors=ROLE_COLORS[role]||ROLE_COLORS['GA'];
      const badge=document.getElementById('userRoleBadge');
      badge.textContent=label;
      badge.style.background=colors.bg;
      badge.style.borderColor=colors.border;
      badge.style.color=colors.text;
      badge.style.border=`1px solid ${colors.border}`;

      // Store role in sessionStorage for fast access
      sessionStorage.setItem('smkg_user_role', role);
      sessionStorage.setItem('smkg_user_name', user.user_metadata?.full_name||user.email);
    }

    /* ON LOAD — check existing session */
    const { data:{ session } } = await supabase.auth.getSession();
    if(session?.user){
      await showLoggedIn(session.user);
    }

    /* LISTEN for auth state changes (OAuth callback returns here) */
    supabase.auth.onAuthStateChange(async (event, session)=>{
      if(event==='SIGNED_IN' && session?.user){
        await showLoggedIn(session.user);
      } else if(event==='SIGNED_OUT'){
        sessionStorage.removeItem('smkg_user_role');
        sessionStorage.removeItem('smkg_user_name');
      }
    });
  </script>
</body>
</html>
