<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <title>Rekod Kawalan Kelas</title>

  <style>

    :root{
      --red:#d60000;
      --dark:#980000;
      --bg:#f5f5f5;
      --text:#222222;
      --border:#e6e6e6;
      --yellow:#fff4c4;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family:'Inter',Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      width:100%;
    }

    .page{
      width:100%;
      min-height:100vh;
      background:#ffffff;
    }

    /* ===== HEADER ===== */

    .header{
      background:linear-gradient(135deg,var(--red),var(--dark));
      color:white;
      padding:16px 18px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .header::after{
      content:"";
      position:absolute;
      left:-20%;
      right:-20%;
      bottom:-42px;
      height:82px;
      background:white;
      border-radius:50%;
    }

    .logo-wrap{
      width:84px;
      height:84px;
      background:transparent;
      border-radius:24px;
      margin:0 auto 6px;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:2;
    }

    .logo-wrap img{
      width:60px;
      height:60px;
      border-radius:14px;
      object-fit:contain;
    }

    .school{
      font-size:22px;
      font-weight:800;
      line-height:1.3;
      position:relative;
      z-index:2;
    }

    .subtitle{
      margin-top:2px;
      font-size:16px;
      opacity:.95;
      position:relative;
      z-index:2;
    }

    /* ===== TICKER ===== */

    .ticker-wrap{
      background:#ffd84d;
      overflow:hidden;
      white-space:nowrap;
      width:100%;
    }

    .ticker-content{
      display:inline-block;
      padding:10px 0;
      font-size:14px;
      font-weight:700;
      color:#333;
      animation:ticker-scroll 18s linear infinite;
    }

    @keyframes ticker-scroll{
      0%{transform:translateX(100%);}
      100%{transform:translateX(-100%);}
    }

    /* ===== INFO TABLE ===== */

    .info-table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    .info-table th{
      background:#f5f5f5;
      font-size:14px;
      font-weight:800;
      padding:12px 16px;
      border:1px solid #e0e0e0;
      text-align:center;
    }

    .info-table th a{
      color:inherit;
      text-decoration:none;
    }

    /* ===== FORM ===== */

    .form-area{
      padding:52px 18px 130px;
    }

    .field{
      margin-bottom:18px;
      position:relative;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:700;
    }

    input,
    select{
      width:100%;
      min-height:60px;
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px 16px;
      font-size:18px;
      background:white;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      transition:.2s ease;
    }

    input:focus,
    select:focus{
      border-color:var(--red);
      box-shadow:0 0 0 4px rgba(214,0,0,.08);
    }

    select{
      background-image:
        linear-gradient(45deg, transparent 50%, #777 50%),
        linear-gradient(135deg, #777 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 26px,
        calc(100% - 15px) 26px;
      background-size:
        5px 5px,
        5px 5px;
      background-repeat:no-repeat;
      padding-right:42px;
    }

    .class-box{
      background:var(--yellow);
      border:1px solid #ffe278;
      font-weight:700;
      color:#5d4600;
    }

    .hint{
      margin-top:7px;
      font-size:13px;
      color:#666666;
      line-height:1.4;
    }

    /* ===== NAME DROPDOWN ===== */

    .name-dropdown{
      display:none;
      position:absolute;
      left:0;
      right:0;
      top:88px;
      background:white;
      border:1px solid #e8e8e8;
      border-radius:16px;
      overflow:hidden;
      max-height:240px;
      overflow-y:auto;
      z-index:999;
      box-shadow:0 12px 30px rgba(0,0,0,.12);
    }

    .name-option{
      padding:14px 16px;
      border-bottom:1px solid #f1f1f1;
      font-size:16px;
      cursor:pointer;
    }

    .name-option:last-child{
      border-bottom:none;
    }

    .name-option:hover,
    .name-option:active{
      background:#fff1f1;
    }

    /* ===== SUBMIT ===== */

    .sticky-submit{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:white;
      border-top:1px solid #ededed;
      padding:12px 16px 18px;
      box-shadow:0 -4px 16px rgba(0,0,0,.06);
      z-index:1000;
    }

    .button{
      width:100%;
      min-height:60px;
      border:none;
      border-radius:18px;
      background:var(--red);
      color:white;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .button:active{
      transform:scale(.99);
      background:#aa0000;
    }

    .button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      margin-top:12px;
      padding:14px;
      border-radius:14px;
      font-size:15px;
      line-height:1.4;
      display:none;
    }

    .status.success{
      display:block;
      background:#eaffea;
      color:#136913;
    }

    .status.error{
      display:block;
      background:#ffecec;
      color:#a00000;
    }

    /* ===== LOADING OVERLAY ===== */

    .loading-overlay{
      position:fixed;
      inset:0;
      background:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .loading-overlay.hidden{
      display:none;
    }

    .loading-spinner{
      width:40px;
      height:40px;
      border:4px solid #e5e5e5;
      border-top-color:var(--red);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    .loading-text{
      margin-top:14px;
      font-size:15px;
      color:#888;
    }

    /* ===== DESKTOP ===== */

    @media(min-width:768px){

      body{
        background:#f1f1f1;
        display:flex;
        justify-content:center;
        padding:20px;
      }

      .page{
        width:100%;
        max-width:620px;
        border-radius:30px;
        overflow:hidden;
        box-shadow:0 18px 40px rgba(0,0,0,.08);
      }

      .sticky-submit{
        position:sticky;
        bottom:0;
      }

    }

    @media(max-width:400px){

      .school{
        font-size:20px;
      }

      .subtitle{
        font-size:15px;
      }

      input,
      select{
        min-height:56px;
        font-size:17px;
      }

    }

  </style>
</head>

          <label for="checkout">Checkout</label>
          <input
            type="time"
            id="checkout"
            required>
        </div>

        <div class="field">
          <label for="totalStudents">Total Students</label>
          <input
            type="number"
            id="totalStudents"
            min="0"
            placeholder="Example: 28"
            required>
        </div>

        <div class="field">
          <label for="remarks">Remarks</label>
          <select id="remarks" required>
            <option value="">Select remarks</option>
            <option value="PdP">PdP</option>
            <option value="PdPr">PdPr</option>
            <option value="Relief Class">Relief Class</option>
          </select>
        </div>

        <div class="sticky-submit">
          <button
            type="submit"
            class="button"
            id="submitBtn">
            Submit Record
          </button>
          <div id="statusBox" class="status"></div>
        </div>

      </form>

    </div>

  </div>

  <script>

    /* ===== CONFIG ===== */
    /* Replace this with your deployed Apps Script URL */
    const API_URL = 'https://script.google.com/macros/s/AKfycbyvGyE-AOn-eDv2F6hQFAYyS6mQEeJRvpRtHEmNvYE3R-SCalUU2Lx3kTdFVH3q2ls/exec';

    /* ===== DOM REFS ===== */

    const form = document.getElementById('recordForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');
    const nameInput = document.getElementById('name');
    const classInput = document.getElementById('className');
    const nameDropdown = document.getElementById('nameDropdown');
    const loadingOverlay = document.getElementById('loadingOverlay');

    /* ===== TEACHER NAMES (loaded from API) ===== */

    let teacherNames = [];

    /* ===== READ TOKEN FROM URL ===== */

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || '';

    /* ===== LOAD CONFIG FROM API ===== */

    async function loadConfig() {
      try {
        const response = await fetch(
          API_URL + '?action=getConfig&token=' + encodeURIComponent(token)
        );
        const data = await response.json();

        if (data.className) {
          classInput.value = data.className;
        } else {
          classInput.value = '';
          showStatus('error', 'Class not detected. Please scan the correct QR code.');
        }

        if (data.teacherNames) {
          teacherNames = data.teacherNames;
        }

      } catch (err) {
        showStatus('error', 'Failed to load. Please check your connection and try again.');
      } finally {
        loadingOverlay.classList.add('hidden');
      }
    }

    loadConfig();

    /* ===== STATUS HELPERS ===== */

    function showStatus(type, message) {
      statusBox.className = 'status ' + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = 'status';
      statusBox.textContent = '';
    }

    /* ===== DROPDOWN HELPERS ===== */

    function hideDropdown() {
      nameDropdown.style.display = 'none';
      nameDropdown.innerHTML = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", "&#039;");
    }

    function showSuggestions(keyword) {
      const q = keyword.trim().toLowerCase();

      if (!q) {
        hideDropdown();
        return;
      }

      const matches = teacherNames
        .filter(function(name) {
          return name.toLowerCase().startsWith(q);
        })
        .slice(0, 15);

      if (matches.length === 0) {
        hideDropdown();
        return;
      }

      nameDropdown.innerHTML = matches.map(function(name) {
        return '<div class="name-option" data-name="' + escapeHtml(name) + '">' +
          escapeHtml(name) + '</div>';
      }).join('');

      nameDropdown.style.display = 'block';
    }

    /* ===== EVENT LISTENERS ===== */

    nameInput.addEventListener('input', function() {
      showSuggestions(nameInput.value);
    });

    nameInput.addEventListener('focus', function() {
      showSuggestions(nameInput.value);
    });

    nameDropdown.addEventListener('click', function(e) {
      const option = e.target.closest('.name-option');
      if (!option) return;
      nameInput.value = option.getAttribute('data-name');
      hideDropdown();
    });

    document.addEventListener('click', function(e) {
      const inside = e.target.closest('#name') || e.target.closest('#nameDropdown');
      if (!inside) hideDropdown();
    });

    /* ===== FORM SUBMIT ===== */

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      clearStatus();

      if (!classInput.value.trim()) {
        showStatus('error', 'Class was not detected. Please scan the correct QR code.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      const formData = {
        action: 'submit',
        name: nameInput.value.trim(),
        className: classInput.value.trim(),
        checkout: document.getElementById('checkout').value.trim(),
        totalStudents: document.getElementById('totalStudents').value.trim(),
        remarks: document.getElementById('remarks').value.trim()
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.ok) {
          showStatus('success', result.message);
          nameInput.value = '';
          document.getElementById('checkout').value = '';
          document.getElementById('totalStudents').value = '';
          document.getElementById('remarks').value = '';
          hideDropdown();
        } else {
          showStatus('error', result.message);
        }

      } catch (err) {
        showStatus('error', 'Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Record';
      }
    });

  </script>

</body>
</html>
